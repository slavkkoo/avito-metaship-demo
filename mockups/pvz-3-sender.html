<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avito — Данные отправителя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f2f2f2;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 600;
            background: #fff;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* Header */
        .header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e5e5e5;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #141414;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #141414;
        }

        /* Selected PVZ Card */
        .pvz-card {
            background: #fff;
            margin: 12px;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .pvz-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 11px;
            color: #fff;
            background: linear-gradient(135deg, #00a651 0%, #00c853 100%);
            flex-shrink: 0;
        }

        .pvz-content {
            flex: 1;
            min-width: 0;
        }

        .pvz-name {
            font-size: 16px;
            font-weight: 600;
            color: #141414;
        }

        .pvz-address {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 2px;
        }

        .pvz-change {
            color: #00aaff;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        /* Section */
        .section {
            background: #fff;
            margin: 12px;
            border-radius: 16px;
            padding: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8f5e9;
        }

        .section-icon svg {
            width: 24px;
            height: 24px;
            fill: #4caf50;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #141414;
        }

        /* Saved Contact */
        .saved-contact {
            background: #f7f7f7;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .saved-contact:hover {
            background: #f0f0f0;
        }

        .saved-avatar {
            width: 44px;
            height: 44px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .saved-avatar svg {
            width: 24px;
            height: 24px;
            fill: #2196f3;
        }

        .saved-info {
            flex: 1;
        }

        .saved-name {
            font-size: 15px;
            font-weight: 600;
            color: #141414;
        }

        .saved-phone {
            font-size: 13px;
            color: #8e8e93;
        }

        .saved-use {
            color: #00aaff;
            font-size: 14px;
            font-weight: 500;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 8px;
            display: block;
        }

        .form-label .required {
            color: #ff3b30;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: #f7f7f7;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            color: #141414;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            background: #fff;
            border-color: #00aaff;
        }

        .form-input::placeholder {
            color: #c7c7cc;
        }

        .form-input.filled {
            background: #fff;
            border-color: #e5e5e5;
        }

        /* Phone Input */
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #f7f7f7;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .phone-input-wrapper:focus-within {
            background: #fff;
            border-color: #00aaff;
        }

        .phone-prefix {
            padding: 14px 0 14px 16px;
            font-size: 16px;
            color: #141414;
            font-weight: 500;
        }

        .phone-input {
            flex: 1;
            padding: 14px 16px 14px 4px;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #141414;
        }

        .phone-input:focus {
            outline: none;
        }

        .phone-input::placeholder {
            color: #c7c7cc;
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 -2px 20px rgba(0,0,0,0.08);
            z-index: 100;
        }

        .submit-btn {
            width: 100%;
            height: 56px;
            padding: 0 24px;
            background: linear-gradient(135deg, #00aaff 0%, #0095e0 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 170, 255, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #00bbff 0%, #00aaff 100%);
            box-shadow: 0 6px 16px rgba(0, 170, 255, 0.4);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0, 170, 255, 0.3);
        }

        .submit-btn:active {
            background: #0088dd;
        }
    </style>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <span>16:05</span>
        <div class="status-icons">
            <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4h2v8H1V4zm4-2h2v10H5V2zm4-2h2v12H9V0zm4 4h2v8h-2V4zm4-2h2v10h-2V2z" fill="#141414"/></svg>
            <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.5c2.7 0 5.2 1 7.1 2.7l-1.4 1.4c-1.5-1.3-3.5-2.1-5.7-2.1s-4.2.8-5.7 2.1L1.4 5.2c1.9-1.7 4.4-2.7 7.1-2.7z" fill="#141414"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#141414" stroke-width="1" fill="none"/><rect x="23" y="4" width="2" height="4" rx="1" fill="#141414"/><rect x="2" y="3" width="14" height="6" rx="1" fill="#141414"/></svg>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <a href="pvz-2-map-from.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </a>
        <div class="header-title">Данные отправителя</div>
    </div>

    <!-- Selected PVZ -->
    <div class="pvz-card">
        <div class="pvz-logo">СДЭК</div>
        <div class="pvz-content">
            <div class="pvz-name">СДЭК</div>
            <div class="pvz-address">ул. Складочная, 1 стр. 5</div>
        </div>
        <a href="pvz-2-map-from.html" class="pvz-change">Изменить</a>
    </div>

    <!-- Sender Section -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="section-title">Контактные данные</div>
        </div>

        <!-- Saved Contact -->
        <div class="saved-contact" onclick="fillSavedContact()">
            <div class="saved-avatar">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            </div>
            <div class="saved-info">
                <div class="saved-name">Вячеслав Блинов</div>
                <div class="saved-phone">+7 (968) 040-89-31</div>
            </div>
            <span class="saved-use">Использовать</span>
        </div>

        <!-- Form -->
        <div class="form-group">
            <label class="form-label">ФИО <span class="required">*</span></label>
            <input type="text" class="form-input" id="nameInput" placeholder="Иванов Иван Иванович">
        </div>

        <div class="form-group">
            <label class="form-label">Телефон <span class="required">*</span></label>
            <div class="phone-input-wrapper">
                <span class="phone-prefix">+7</span>
                <input type="tel" class="phone-input" id="phoneInput" placeholder="(___) ___-__-__">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="emailInput" placeholder="email@example.com">
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <a href="pvz-4-map-to.html" class="submit-btn">Готово</a>
    </div>

    <script>
        function fillSavedContact() {
            document.getElementById('nameInput').value = 'Вячеслав Блинов';
            document.getElementById('nameInput').classList.add('filled');

            document.getElementById('phoneInput').value = '(968) 040-89-31';

            document.getElementById('emailInput').value = 'blinov@mail.ru';
            document.getElementById('emailInput').classList.add('filled');
        }

        // Phone mask
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) value = value.slice(0, 10);

            let formatted = '';
            if (value.length > 0) formatted += '(' + value.slice(0, 3);
            if (value.length >= 3) formatted += ') ';
            if (value.length > 3) formatted += value.slice(3, 6);
            if (value.length >= 6) formatted += '-';
            if (value.length > 6) formatted += value.slice(6, 8);
            if (value.length >= 8) formatted += '-';
            if (value.length > 8) formatted += value.slice(8, 10);

            e.target.value = formatted;
        });
    </script>
</body>
</html>
